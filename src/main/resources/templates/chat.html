<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI对话助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
</head>
<body>
    <div id="app">
        <el-card style="max-width: 800px; margin: 50px auto;">
            <template #header>
                <div style="background: linear-gradient(135deg, #409eff 0%, #36cfc9 100%); color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold;">
                    <el-icon style="vertical-align: middle; margin-right: 10px;">
                        <ChatLineRound />
                    </el-icon>
                    AI 对话助手
                </div>
            </template>
            <div ref="chatContainer" style="height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;">
                <div 
                    v-for="(msg, index) in messages" 
                    :key="index"
                    :style="getMessageStyle(msg.type)"
                >
                    {{ msg.content }}
                </div>
            </div>
            <div style="display: flex; gap: 10px; padding: 15px 0;">
                <el-select v-model="selectedApi" placeholder="选择API接口" style="width: 150px;">
                    <el-option label="默认接口" value="/api/chat"></el-option>
                    <el-option label="单次记忆接口" value="/api/memChat"></el-option>
                    <el-option label="暂留接口" value="/api/claude"></el-option>
                </el-select>
                <el-input 
                    v-model="inputMessage" 
                    placeholder="输入你的问题..." 
                    @keyup.enter="sendMessage"
                    ref="inputRef"
                    :disabled="isLoading"
                    style="flex: 1;"
                />
                <el-button 
                    type="primary" 
                    @click="sendMessage" 
                    :disabled="isLoading || !inputMessage.trim()"
                    :loading="isLoading"
                >
                    <el-icon><Promotion /></el-icon>
                    发送
                </el-button>
            </div>
        </el-card>
    </div>

    <script>
        const { createApp, ref, nextTick, onMounted } = Vue;

        const app = createApp({
            setup() {
                const messages = ref([
                    { content: '你好！我是AI助手，有什么可以帮助你的吗？', type: 'assistant' }
                ]);
                const inputMessage = ref('');
                const isLoading = ref(false);
                const chatContainer = ref(null);
                const inputRef = ref(null);
                const selectedApi = ref('/api/chat');

                const getMessageStyle = (type) => {
                    const baseStyle = {
                        padding: '12px 18px',
                        borderRadius: '18px',
                        maxWidth: '80%',
                        wordWrap: 'break-word'
                    };
                    
                    if (type === 'user') {
                        return {
                            ...baseStyle,
                            background: '#409eff',
                            color: 'white',
                            alignSelf: 'flex-end',
                            marginLeft: 'auto',
                            borderBottomRightRadius: '5px'
                        };
                    } else if (type === 'error') {
                        return {
                            ...baseStyle,
                            background: '#f56c6c',
                            color: 'white',
                            borderBottomLeftRadius: '5px'
                        };
                    } else {
                        return {
                            ...baseStyle,
                            background: '#f0f0f0',
                            color: '#333',
                            borderBottomLeftRadius: '5px'
                        };
                    }
                };

                const scrollToBottom = async () => {
                    await nextTick();
                    if (chatContainer.value) {
                        chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
                    }
                };

                const sendMessage = async () => {
                    const message = inputMessage.value.trim();
                    if (!message || isLoading.value) return;

                    messages.value.push({ content: message, type: 'user' });
                    inputMessage.value = '';
                    isLoading.value = true;

                    try {
                        const response = await fetch(selectedApi.value, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ message })
                        });

                        const data = await response.json();
                        messages.value.push({ 
                            content: data.response, 
                            type: data.success ? 'assistant' : 'error' 
                        });
                    } catch (error) {
                        messages.value.push({ 
                            content: '抱歉，发生了网络错误，请稍后重试。', 
                            type: 'error' 
                        });
                    } finally {
                        isLoading.value = false;
                        await scrollToBottom();
                        if (inputRef.value && inputRef.value.$el) {
                            inputRef.value.$el.focus();
                        }
                    }
                };

                onMounted(() => {
                    scrollToBottom();
                });

                return {
                    messages,
                    inputMessage,
                    isLoading,
                    chatContainer,
                    inputRef,
                    selectedApi,
                    getMessageStyle,
                    sendMessage
                };
            }
        });

        app.use(ElementPlus);
        Object.keys(ElementPlusIconsVue).forEach(key => {
            app.component(key, ElementPlusIconsVue[key]);
        });
        app.mount('#app');
    </script>
</body>
</html>
