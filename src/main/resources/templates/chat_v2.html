<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI对话助手</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        #app {
            height: 100vh;
        }
        .el-card {
            height: 100vh !important;
            margin: 0 !important;
            max-width: none !important;
            border-radius: 0 !important;
        }
        .el-card__body {
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
        .markdown-body {
            background-color: #e9ecef !important;
        }
    </style>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown-light.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/lib/marked.umd.min.js"></script>
    <script src="https://unpkg.com/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
    <div id="app">
        <el-card style="max-width: 800px; margin: 50px auto;">
            <template #header>
                <div style="background: linear-gradient(135deg, #409eff 0%, #36cfc9 100%); color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold;">
                    <el-icon style="vertical-align: middle; margin-right: 10px;">
                        <ChatLineRound />
                    </el-icon>
                    AI 对话助手
                </div>
            </template>
            <div style="display: flex; gap: 10px; padding: 10px 15px; flex-shrink: 0; align-items: center;">
                <span style="font-size: 14px; color: #606266; white-space: nowrap;">会话ID：</span>
                <el-input
                    v-model="sId"
                    placeholder="会话ID"
                    style="width: 300px;"
                >
                    <template #prepend>
                        <el-icon @click="generateSessionId" style="cursor: pointer;">
                            <RefreshRight />
                        </el-icon>
                    </template>
                </el-input>
                <el-select v-model="selectedApi" placeholder="选择API接口" style="width: 150px;">
                    <el-option label="默认接口" value="/api/adv/chat"></el-option>
                    <el-option label="单次记忆接口" value="/api/memChat"></el-option>
                    <el-option label="LC4J接口" value="/api/memChatV2"></el-option>
                    <el-option label="Stream接口" value="/api/streamChat"></el-option>
                    <el-option label="Search接口" value="/api/searchChat"></el-option>
                    <el-option label="SearchV2接口" value="/api/searchChatV2"></el-option>
                    <el-option label="RAG接口" value="/api/ragChat"></el-option>
                    <el-option label="RAGV2接口" value="/api/ragChatV2"></el-option>
                </el-select>
            </div>
            <div ref="chatContainer" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;">
                <div 
                    v-for="(msg, index) in messages" 
                    :key="index"
                    :style="getMessageStyle(msg.type)"
                >
                    <div 
                        v-if="msg.type === 'user' || msg.type === 'error'"
                    >{{ msg.content }}</div>
                    <div 
                        v-else
                        class="markdown-body"
                        v-html="renderMarkdown(msg.content)"
                    ></div>
                </div>
            </div>
            <div style="display: flex; gap: 10px; padding: 15px 0; flex-shrink: 0;">
                <el-input
                    v-model="inputMessage"
                    placeholder="输入你的问题..."
                    @keyup.enter="sendMessage"
                    ref="inputRef"
                    :disabled="isLoading"
                    style="flex: 1;"
                />
                <el-button
                    type="primary"
                    @click="sendMessage"
                    :disabled="isLoading || !inputMessage.trim()"
                    :loading="isLoading"
                >
                    <el-icon><Promotion /></el-icon>
                    发送
                </el-button>
            </div>
        </el-card>
    </div>

    <script>
        const { createApp, ref, nextTick, onMounted } = Vue;

        const app = createApp({
            setup() {
                const messages = ref([
                    { content: '你好！我是AI助手，有什么可以帮助你的吗？', type: 'assistant' }
                ]);
                const inputMessage = ref('');
                const isLoading = ref(false);
                const chatContainer = ref(null);
                const inputRef = ref(null);
                const selectedApi = ref('/api/adv/chat');
                const sId = ref('');

                const getMessageStyle = (type) => {
                    const baseStyle = {
                        padding: '12px 18px',
                        borderRadius: '18px',
                        maxWidth: '80%',
                        wordWrap: 'break-word'
                    };
                    
                    if (type === 'user') {
                        return {
                            ...baseStyle,
                            background: '#409eff',
                            color: 'white',
                            alignSelf: 'flex-end',
                            marginLeft: 'auto',
                            borderBottomRightRadius: '5px'
                        };
                    } else if (type === 'error') {
                        return {
                            ...baseStyle,
                            background: '#f56c6c',
                            color: 'white',
                            borderBottomLeftRadius: '5px'
                        };
                    } else {
                        return {
                            ...baseStyle,
                            background: '#e9ecef',
                            color: '#212529',
                            borderBottomLeftRadius: '5px',
                            maxWidth: '90%',
                            textAlign: 'left'
                        };
                    }
                };

                const renderMarkdown = (content) => {
                    if (!content) return '';
                    const html = marked.parse(content);
                    return DOMPurify.sanitize(html);
                };

                console.log('marked:', typeof marked);
                console.log('DOMPurify:', typeof DOMPurify);

                const generateSessionId = () => {
                    return 'session_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
                };

                const scrollToBottom = async () => {
                    await nextTick();
                    if (chatContainer.value) {
                        chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
                    }
                };

                const sendMessage = async () => {
                    const message = inputMessage.value.trim();
                    if (!message || isLoading.value) return;

                    messages.value.push({ content: message, type: 'user' });
                    inputMessage.value = '';
                    isLoading.value = true;

                    try {
                        const response = await fetch(selectedApi.value, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ 
                                memoryId: sId.value,
                                message 
                            })
                        });

                        const data = await response.json();
                        messages.value.push({ 
                            content: data.response, 
                            type: data.success ? 'assistant' : 'error' 
                        });
                    } catch (error) {
                        messages.value.push({ 
                            content: '抱歉，发生了网络错误，请稍后重试。', 
                            type: 'error' 
                        });
                    } finally {
                        isLoading.value = false;
                        await scrollToBottom();
                        if (inputRef.value && inputRef.value.$el) {
                            inputRef.value.$el.focus();
                        }
                    }
                };

                onMounted(() => {
                    sId.value = generateSessionId();
                    scrollToBottom();
                });

                return {
                    messages,
                    inputMessage,
                    isLoading,
                    chatContainer,
                    inputRef,
                    selectedApi,
                    sId,
                    getMessageStyle,
                    renderMarkdown,
                    sendMessage,
                    generateSessionId
                };
            }
        });

        app.use(ElementPlus);
        Object.keys(ElementPlusIconsVue).forEach(key => {
            app.component(key, ElementPlusIconsVue[key]);
        });
        app.mount('#app');
    </script>
</body>
</html>
